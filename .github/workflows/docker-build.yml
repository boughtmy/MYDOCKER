name: Build Docker Image Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read image name
        id: image
        run: |
          IMAGE_NAME=$(grep 'LABEL image.name=' Dockerfile | sed 's/.*="//;s/"//')
          echo "name=$IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Build image
        run: |
          docker build -t ${{ steps.image.outputs.name }}:latest .

      - name: Save image
        run: |
          docker save ${{ steps.image.outputs.name }}:latest \
            | gzip > ${{ steps.image.outputs.name }}.tar.gz

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: |
            ${{ steps.image.outputs.name }}.tar.gz
