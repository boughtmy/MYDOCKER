name: Build and Publish Docker Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Read image name from Dockerfile
        id: image
        shell: bash
        run: |
          IMAGE_NAME=$(sed -n 's/^LABEL image\.name="\([^"]*\)".*/\1/p' Dockerfile)

          if [ -z "$IMAGE_NAME" ]; then
            echo "LABEL image.name not found in Dockerfile"
            exit 1
          fi

          echo "IMAGE_NAME=$IMAGE_NAME"
          echo "name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/${{ steps.image.outputs.name }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push \
            ghcr.io/${{ github.repository_owner }}/${{ steps.image.outputs.name }}:latest
